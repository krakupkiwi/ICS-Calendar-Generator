version: '3.9'

# ─── Quick start ──────────────────────────────────────────────────────────────
# 1. Clone this repo to your server / Unraid share
# 2. (Optional) copy .env.example to .env and set HOST_PORT
# 3. docker compose up -d --build
#
# The app will be available at http://<server-ip>:<HOST_PORT>
# Fixture data is persisted in the named volume 'fixture-data'.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ─── Backend API (Node.js + Express) ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ics-calendar-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATA_PATH=/data/fixtures.json
    volumes:
      - fixture-data:/data
    networks:
      - ics-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Frontend (React + Nginx) ────────────────────────────────────────────────
  # Build context is project root so Dockerfile can access docker/nginx.conf
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ics-calendar-frontend
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ics-net

# ─── Named volume for fixture data persistence ──────────────────────────────
volumes:
  fixture-data:
    driver: local

# ─── Internal network ────────────────────────────────────────────────────────
networks:
  ics-net:
    driver: bridge
